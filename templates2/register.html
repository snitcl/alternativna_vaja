<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>
    <h1>Registracija</h1>
    <form method="POST">
        <input type="text" name="username" placeholder="Uporabniško ime" required>
        <input type="password" name="password" placeholder="Geslo" required>
        <button type="submit">Registriraj</button>
    </form>
    <br>
    <form action="/login">
        <button type="submit">Nazaj na Login</button>
    </form>
</body>
</html>
