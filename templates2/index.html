<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Socialna mreža</title>
    <!-- vključen jQuery za $.ajax -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // ======= AJAX ZA BRISANJE OBJAV =======
        // Funkcija pošlje POST request na strežnik in odstrani objavo iz seznama
        function deletePost(index) {
            $.ajax({
                url: '/delete/' + index,   // naslov za brisanje
                method: 'POST',
                success: function(data) {
                    if (data.success) {
                        // odstranimo element iz HTML seznama
                        $('#post-' + index).remove();
                    } else {
                        alert("Brisanje ni uspelo.");
                    }
                }
            });
        }
    </script>
</head>
<body>
    <h1>Socialna mreža</h1>
    <p>Prijavljen kot: {{ username }} | <a href="/logout">Logout</a></p>

    <!-- OBRAZEC ZA DODAJANJE OBJAV -->
    <form method="POST" enctype="multipart/form-data">
        <textarea name="content" placeholder="Napiši objavo" required></textarea>
        <input type="file" name="image" accept="image/*">
        <button type="submit">Objavi</button>
    </form>

    <!-- SEZNAM OBJAV -->
    <ul>
        {% for post in posts %}
        <li id="post-{{ loop.index0 }}">
            <strong>{{ post.username }}</strong>: {{ post.content }}
            {% if post.image %}
                <br><img src="{{ url_for('static', filename='uploads/' + post.image) }}" width="200">
            {% endif %}
            {% if post.username == username %}
                <br>
                <!-- Gumb za brisanje z AJAX -->
                <button onclick="deletePost({{ loop.index0 }})">Izbriši</button>
            {% endif %}
        </li>
        {% endfor %}
    </ul>
</body>
</html>
