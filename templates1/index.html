<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Osebni zapiski</title>
</head>
<body>
    <h1>Osebni zapiski</h1>

    <p>Prijavljen kot: {{ session.username }} | <a href="/logout">Logout</a></p>

    <form method="POST">
        <input type="text" name="title" placeholder="Naslov" required>
        <textarea name="content" placeholder="Vsebina" required></textarea>
        <button type="submit">Dodaj</button>
    </form>

    <ul>
        {% for note in notes %}
        <li>
            <strong>{{ note.title }}</strong>: {{ note.content }}
            <a href="/delete/{{ loop.index0 }}">Izbriši</a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
