<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Osebni zapiski</title>
    <!-- jqery za AJAX -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        function addNote(event) {

            // to preprec refresh
            event.preventDefault();
            let title = document.getElementById("title").value;
            let content = document.getElementById("content").value;

            // AJAX
            $.ajax({
                url: "/add_note",
                method: "POST",
                data: {
                    title: title,
                    content: content
                },
                success: function(data) {
                    // tuki dodam note
                    let li = document.createElement("li");
                    li.innerHTML =
                    "<strong>" +
                    data.title +
                    "</strong>: " +
                    data.content;
                    document.getElementById("notes_list").appendChild(li);
                    document.getElementById("title").value = "";
                    document.getElementById("content").value = "";
                }
            });
        }
    </script>
</head>

<body>
    <h1>Osebni zapiski</h1>
    <p>Prijavljen kot:{{ session.username }}|<a href="/logout">Logout</a></p>
    <form onsubmit="addNote(event)">
        <input
            type="text"
            id="title"
            placeholder="Naslov"
            required
        >
        <br><br>
        <textarea
            id="content"
            placeholder="Vsebina"
            required
        ></textarea>
        <br><br>
        <button type="submit">Dodaj</button>
    </form>
    <hr>
    <ul id="notes_list">
        {% for note in notes %}
        <li>
            <strong>{{ note.title }}</strong>:
            {{ note.content }}
            <a href="/delete/{{ loop.index0 }}">Izbriši</a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
